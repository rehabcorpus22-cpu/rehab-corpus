<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rehab Corpus | Clínica Deportiva Premium</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Poppins',sans-serif;background:#ffffff;color:#0b1f3a}
header{background:rgba(11,31,58,0.9);color:white;padding:15px 20px;display:flex;justify-content:space-between;align-items:center;position:fixed;width:100%;top:0;z-index:1000}
header img{height:50px}
header h2{font-weight:700}
header a{color:white;text-decoration:none;margin-left:15px}
.hero{height:100vh;background:url('WhatsApp%20Image%202026-04-13%20at%2010.25.01%20AM.jpeg') center/cover no-repeat;display:flex;align-items:center;justify-content:center;position:relative;color:white;text-align:center}
.hero::after{content:"";position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(11,31,58,0.65)}
.hero-content{position:relative;z-index:2;max-width:700px}
.hero h1{font-size:3em;margin-bottom:15px}
.section{padding:100px 20px;text-align:center}
.section h2{margin-bottom:20px;font-size:2em}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:30px;margin-top:40px}
.card{background:white;padding:25px;border-radius:20px;box-shadow:0 10px 30px rgba(0,0,0,0.1);transition:0.4s}
.card img{width:100%;border-radius:15px}
.footer{background:#0b1f3a;color:white;text-align:center;padding:20px}
</style>
</head>
<body>
<header>
<img src="WhatsApp%20Image%202026-04-13%20at%2011.03.13%20A.png" alt="Logo">
<h2>Rehab Corpus</h2>
<div>
<a href="#servicios">Servicios</a>
<a href="#equipo">Equipo</a>
</div>
</header>
<section class="hero">
<div class="hero-content">
<h1>Recupera tu cuerpo con atención de alto nivel</h1>
<p>Especialistas en rehabilitación deportiva y ortopedia</p>
</div>
</section>
<section class="section" id="equipo">
<h2>Equipo Profesional</h2>
<div class="grid">
<div class="card"><img src="WhatsApp%20Image%202026-04-13%20at%2010.33.13%20AM.jpeg" alt="Equipo 1"></div>
<div class="card"><img src="WhatsApp%20Image%202026-04-13%20at%2010.23.59%20AM.jpeg" alt="Equipo 2"></div>
<div class="card"><img src="WhatsApp%20Image%202026-04-13%20at%2010.35.28%20AM.jpeg" alt="Equipo 3"></div>
</div>
</section>
<div class="footer">
<p>© 2026 Rehab Corpus</p>
</div>
</body>
</html>
